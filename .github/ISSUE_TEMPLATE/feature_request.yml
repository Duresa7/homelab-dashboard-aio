name: Feature request
description: Suggest an improvement or new capability
labels: ['enhancement', 'needs-triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation where the dashboard falls short for you.
      placeholder: I run a MikroTik router, so the Network section shows nothing for me.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Your idea for how it could work. Rough is fine.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      options:
        - UI / navigation
        - Data Center (Proxmox)
        - Network
        - NAS
        - Containers
        - Storage
        - Inventory
        - Onboarding / setup
        - Security / auth
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Anything you've tried or considered instead.
