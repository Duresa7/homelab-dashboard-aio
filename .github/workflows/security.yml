name: Security

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: these jobs only read the repo.
permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret & PII scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the PR commit-range scan can see every commit a PR
          # introduces — a secret added and then deleted within the PR still trips.
          fetch-depth: 0

      # The committed rules are generic (secrets, keys, private IPv4/IPv6, MAC,
      # email). Operator-private values (real hostnames, home WAN IP, real domain)
      # are NOT in the repo — putting them in this public config would be the leak.
      # They are injected here from the PII_DENYLIST secret, if it is set.
      - name: Assemble gitleaks config (+ optional private PII denylist)
        env:
          PII_DENYLIST: ${{ secrets.PII_DENYLIST }}
        run: |
          set -euo pipefail
          cfg="$RUNNER_TEMP/gitleaks.toml"
          cp .gitleaks.toml "$cfg"
          if [ -n "${PII_DENYLIST:-}" ]; then
            alt=$(printf '%s\n' "$PII_DENYLIST" \
              | sed '/^[[:space:]]*$/d' \
              | sed -E 's#[][(){}.^$*+?|\\/]#\\&#g' \
              | paste -sd '|' -)
            if [ -n "$alt" ]; then
              {
                printf '\n[[rules]]\n'
                printf 'id = "pii-denylist"\n'
                printf 'description = "Operator-private value (real hostname/IP/domain) via the PII_DENYLIST secret."\n'
                printf "regex = '''(?i)(%s)'''\n" "$alt"
                printf 'tags = ["pii", "private"]\n'
              } >> "$cfg"
            fi
          fi
          echo "GITLEAKS_CONFIG=$cfg" >> "$GITHUB_ENV"

      # Working-tree scan: catches anything present in the current files. Pinned by
      # digest for reproducibility; fails the job on any finding.
      - name: gitleaks — working tree (secrets + PII)
        run: |
          docker run --rm -v "$PWD:/repo:ro" -v "$GITLEAKS_CONFIG:/config.toml:ro" \
            ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source /repo --no-git --config /config.toml --redact --verbose

      # History scan: catches a secret added then removed within the PR's own
      # commits, which the working-tree pass alone would miss. (The gitleaks image
      # already sets git safe.directory '*', so the mounted repo's uid is fine.)
      - name: gitleaks — PR commit range (history)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm -v "$PWD:/repo" -v "$GITLEAKS_CONFIG:/config.toml:ro" \
            ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source /repo --config /config.toml --redact --verbose \
            --log-opts "--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # Dependency Review only works on pull requests (it diffs the dependency graph).
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          # Block PRs that introduce a High+ severity advisory in a new/updated dep.
          fail-on-severity: high
